services:
  - type: web
    name: welding-forecast
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn src.server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHONIOENCODING
        value: utf-8
    disk:
      name: output
      mountPath: /opt/render/project/src/output
      sizeGB: 1
